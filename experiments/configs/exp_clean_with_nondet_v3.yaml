experiment_name: exp_clean_with_nondet_v3
description: >
  Clean clips + NON_DETECTION (inter-sign transitions + resting poses).
  Dual threshold, 5x non-detection aug, larger dev set (20%), 30 epochs
  to avoid runaway overfitting on a tiny dev set.

data:
  # ── Annotated gloss clips ─────────────────────────────────────────────────
  use_annotated_clips: true
  annotated_manifest: data/manifests/gloss_clips_manifest.xlsx
  annotated_features_dir: data/gloss_clips_features

  # ── Non-detection clips ───────────────────────────────────────────────────
  use_non_detection: true
  non_detection_manifest: data/manifests/non_detection_manifest.xlsx
  non_detection_features_dir: data/non_detection_clips_features
  non_detection_aug_factor: 5

  # ── Auslan Daily (not used) ───────────────────────────────────────────────
  use_auslan_daily: false
  auslan_daily_manifest: data/manifests/Auslan-Daily_Communication_with_gloss_fixed_v2.xlsx
  auslan_daily_features_dir: data/features

  # ── Shared settings ───────────────────────────────────────────────────────
  gloss_col: gloss
  split_col: Split
  filter_to_manual_glosses: false
  clean_clips_as_test: true
  test_split_strategy: stratified
  test_fraction: 0.20
  split_seed: 42
  exclude_glosses: ["FINISH", "BYE", "LOOK"]

  # ── Dev set — carve 20% of non-augmented train clips ─────────────────────
  # Gives ~100 dev clips vs ~55 with the old 10% default.
  # More dev clips = much more reliable best-epoch selection.
  dev_fraction: 0.20

model:
  frame_feat_dim: 258
  proj_dim: 128
  n_heads: 4
  n_layers: 3
  dropout: 0.2
  max_frames: 300

training:
  epochs: 30
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  min_gloss_freq: 1
  confidence_threshold: 0.25
  non_detection_threshold: 0.55

output:
  results_dir: results