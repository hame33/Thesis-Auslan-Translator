experiment_name: exp_clean_with_nondet
description: >
  Train on hand-annotated clean gloss clips + augmented variants,
  with a NON_DETECTION class added from the non-detection manifest.
  Stratified 20% test holdout from originals.

data:
  # ── Annotated gloss clips ─────────────────────────────────────────────────
  use_annotated_clips: true
  annotated_manifest: data/manifests/gloss_clips_manifest.xlsx
  annotated_features_dir: data/gloss_clips_features

  # ── Non-detection clips ───────────────────────────────────────────────────
  use_non_detection: true
  non_detection_manifest: data/manifests/non_detection_manifest.xlsx
  non_detection_features_dir: data/non_detection_clips_features

  # ── Auslan Daily (not used here) ──────────────────────────────────────────
  use_auslan_daily: false
  auslan_daily_manifest: data/manifests/Auslan-Daily_Communication_with_gloss_fixed_v2.xlsx
  auslan_daily_features_dir: data/features

  # ── Shared settings ───────────────────────────────────────────────────────
  gloss_col: gloss
  split_col: Split
  filter_to_manual_glosses: false
  clean_clips_as_test: true
  test_split_strategy: stratified
  test_fraction: 0.20
  split_seed: 42
  exclude_glosses: ["FINISH", "BYE", "LOOK"]

model:
  frame_feat_dim: 258        # 33×4 pose + 21×3 left hand + 21×3 right hand
  proj_dim: 128
  n_heads: 4
  n_layers: 3
  dropout: 0.2
  max_frames: 300

training:
  epochs: 40
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  min_gloss_freq: 1          # NON_DETECTION must always pass this threshold
  confidence_threshold: 0.35

output:
  results_dir: results